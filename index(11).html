<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interest Calculator</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0}
.container{max-width:700px;margin:40px auto;background:#fff;padding:25px;border-radius:12px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
h1{text-align:center}
label{display:block;margin-top:12px;font-weight:bold}
input,select,button{width:100%;padding:10px;margin-top:6px;box-sizing:border-box}
button{margin-top:18px;background:#2563eb;color:#fff;border:none;border-radius:6px;cursor:pointer}
.result{margin-top:20px;padding:15px;background:#eef7ff;border-radius:8px;line-height:1.8}
</style>
</head>
<body>
<div class="container">
<h1>Simple & Compound Interest Calculator</h1>

<label>Principal Amount (₹)</label>
<input type="number" id="principal" placeholder="100000">

<label>Annual Interest Rate (%)</label>
<input type="number" id="rate" step="0.01" placeholder="1.5">

<label>Start Date</label>
<input type="date" id="startDate">

<label>End Date</label>
<input type="date" id="endDate">

<label>Calculation Type</label>
<select id="type">
<option value="simple">Simple Interest</option>
<option value="compound">Compound Interest</option>
</select>

<label>Compounding Frequency (Compound Interest Only)</label>
<select id="frequency">
<option value="1">Annually</option>
<option value="2">Half-Yearly</option>
<option value="4">Quarterly</option>
<option value="12">Monthly</option>
<option value="365">Daily</option>
</select>

<button onclick="calculate()">Calculate</button>

<div id="result" class="result">
Enter the details and click Calculate.
</div>
</div>

<script>
function calculate(){

    const P=parseFloat(document.getElementById("principal").value);
    const R=parseFloat(document.getElementById("rate").value);
    const start=new Date(document.getElementById("startDate").value);
    const end=new Date(document.getElementById("endDate").value);
    const type=document.getElementById("type").value;
    const n=parseInt(document.getElementById("frequency").value);

    if(isNaN(P)||P<=0){
        alert("Enter a valid principal amount.");
        return;
    }

    if(isNaN(R)||R<0){
        alert("Enter a valid annual interest rate.");
        return;
    }

    if(isNaN(start.getTime())||isNaN(end.getTime())){
        alert("Please select both dates.");
        return;
    }

    if(end<=start){
        alert("End date must be after Start date.");
        return;
    }

    // Exact calendar day difference
    const days=Math.round((end-start)/(1000*60*60*24));

    // Actual/365 convention
    const years=days/365;

    let interest,total;

    if(type==="simple"){
        interest=(P*R*days)/(100*365);
        total=P+interest;
    }else{
        total=P*Math.pow(1+(R/(100*n)),n*years);
        interest=total-P;
    }

    document.getElementById("result").innerHTML=`
    <b>Principal:</b> ₹${P.toFixed(2)}<br>
    <b>Interest Rate:</b> ${R}% per year<br>
    <b>Duration:</b> ${days} day(s)<br>
    <b>Interest Earned:</b> ₹${interest.toFixed(2)}<br>
    <b>Total Amount:</b> ₹${total.toFixed(2)}
    `;
}
</script>
</body>
</html>
